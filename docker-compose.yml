version: '3.8'

services:

  app:
    build: .
    container_name: nocopyzone-app
    ports:
      - "8080:8080"
    environment:
      # application.yml dagi o'zgaruvchilarni shu yerda Docker tarmog'iga moslab beramiz
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/nocopyzone?sslmode=disable
      SPRING_DATASOURCE_USERNAME: postgres
      SPRING_DATASOURCE_PASSWORD: postgres
      # Redis uchun standart 6379 portini ishlatish tavsiya etiladi
      SPRING_DATA_REDIS_URL: redis://redis:6379
      SPRING_RABBITMQ_ADDRESSES: amqp://guest:guest@rabbitmq:5672/
      APP_JWT_SECRET: nocopyzone-super-secret-key-minimum-256-bits-long-for-hs256
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - nocopyzone-net

  # ===== POSTGRESQL =====
  postgres:
    image: postgres:16-alpine
    container_name: nocopyzone-postgres
    ports:
      - "5433:5432" # Tashqaridan 5433, ichkarida 5432
    environment:
      POSTGRES_DB: nocopyzone
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - nocopyzone-net

  # ===== REDIS =====
  redis:
    image: redis:7-alpine
    container_name: nocopyzone-redis
    ports:
      - "6379:6379" # 6380 o'rniga 6379 standartga qaytarildi
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - nocopyzone-net

  # ===== RABBITMQ =====
  rabbitmq:
    image: rabbitmq:3-management-alpine
    container_name: nocopyzone-rabbitmq
    ports:
      - "5672:5672"
      - "15672:15672"
    environment:
      RABBITMQ_DEFAULT_USER: guest
      RABBITMQ_DEFAULT_PASS: guest
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - nocopyzone-net

volumes:
  postgres_data:
  redis_data:
  rabbitmq_data:

networks:
  nocopyzone-net:
    driver: bridge
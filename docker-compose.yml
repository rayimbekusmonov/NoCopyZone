version: '3.8'

services:

  app:
    build: .
    container_name: nocopyzone-app
    ports:
      - "8080:8080"
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/nocopyzone
      SPRING_DATASOURCE_USERNAME: postgres
      SPRING_DATASOURCE_PASSWORD: postgres
      SPRING_DATA_REDIS_HOST: redis
      SPRING_DATA_REDIS_PORT: 6379
      SPRING_RABBITMQ_HOST: rabbitmq
      SPRING_RABBITMQ_PORT: 5672
      APP_JWT_SECRET: nocopyzone-super-secret-key-minimum-256-bits-long-for-hs256
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - nocopyzone-net

  # ===== POSTGRESQL =====
  postgres:
    image: postgres:16-alpine
    container_name: nocopyzone-postgres
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: nocopyzone
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - nocopyzone-net

  # ===== REDIS =====
  redis:
    image: redis:7-alpine
    container_name: nocopyzone-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - nocopyzone-net

  # ===== RABBITMQ =====
  rabbitmq:
    image: rabbitmq:3-management-alpine
    container_name: nocopyzone-rabbitmq
    ports:
      - "5672:5672"
      - "15672:15672"   # Management UI: http://localhost:15672
    environment:
      RABBITMQ_DEFAULT_USER: guest
      RABBITMQ_DEFAULT_PASS: guest
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - nocopyzone-net

volumes:
  postgres_data:
  redis_data:
  rabbitmq_data:

networks:
  nocopyzone-net:
    driver: bridge
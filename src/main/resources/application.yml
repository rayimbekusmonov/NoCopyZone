spring:
  application:
    name: NoCopyZone

  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5433/nocopyzone?sslmode=disable}
    username: ${SPRING_DATASOURCE_USERNAME:postgres}
    password: ${SPRING_DATASOURCE_PASSWORD:postgres}
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 5
      minimum-idle: 1

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    open-in-view: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect

  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true

  data:
    redis:
      url: ${SPRING_DATA_REDIS_URL:redis://localhost:6380}
      timeout: 2000ms

  rabbitmq:
    addresses: ${SPRING_RABBITMQ_ADDRESSES:amqp://guest:guest@localhost:5672/}

  mail:
    host: ${MAIL_HOST:smtp.gmail.com}
    port: 587
    username: ${MAIL_USERNAME:}
    password: ${MAIL_PASSWORD:}
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true

  servlet:
    multipart:
      enabled: true
      max-file-size: 50MB
      max-request-size: 55MB

server:
  port: ${PORT:8081}
  servlet:
    context-path: /api

app:
  jwt:
    secret: ${APP_JWT_SECRET:nocopyzone-super-secret-key-minimum-256-bits-long-for-hs256}
    expiration: 86400000
    refresh-expiration: 604800000

  upload:
    dir: ${UPLOAD_DIR:uploads}

  proctoring:
    log-flush-interval: 5000
    max-tab-switches: 3

logging:
  level:
    com.rayimbek.nocopyzone: DEBUG
    org.springframework.security: INFO